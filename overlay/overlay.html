<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nopolo TTS Overlay</title>
    <link rel="stylesheet" href="/static/overlay.css">
</head>
<body>
    <div id="overlay-wrapper" class="hidden">

        <!-- ── Cabecera de marca (FUERA del recuadro) ─────────── -->
        <div id="brand-header">
            <img id="brand-logo" src="" alt="Logo" />
            <span id="brand-creator"></span>
        </div>

        <!-- ── Cuadro de texto ────────────────────────────────── -->
        <div id="tts-container">

            <!-- ── Texto principal ──────────────────────────────── -->
            <div id="text-content"></div>

        </div>

    </div>

    <script>
        // ── Parámetros URL ──────────────────────────────────────────────────
        const urlParams   = new URLSearchParams(window.location.search);
        const wsPort      = urlParams.get('port') || '8765';
        const logoSrc     = urlParams.get('logo') || '/assets/nopolo_icon.png';

        // ── Aplicar marca ───────────────────────────────────────────────────
        const brandLogo    = document.getElementById('brand-logo');
        const brandCreator = document.getElementById('brand-creator');
        brandLogo.src = logoSrc;
        brandLogo.onerror = () => { brandLogo.style.display = 'none'; };

        // ── Referencias DOM ─────────────────────────────────────────────────
        const container  = document.getElementById('overlay-wrapper');
        const textContent= document.getElementById('text-content');
        
        // ── Estado WebSocket ────────────────────────────────────────────────
        let ws                = null;
        let reconnectTimeout  = null;
        let pingInterval      = null;
        let hideTimeout       = null;
        let isConnecting      = false;
        let reconnectAttempts = 0;

        function connect() {
            if (isConnecting) return;
            if (reconnectTimeout) { clearTimeout(reconnectTimeout);  reconnectTimeout = null; }
            if (pingInterval)     { clearInterval(pingInterval);     pingInterval = null; }
            if (ws) {
                ws.onclose = null; ws.onerror = null; ws.onmessage = null;
                try { ws.close(); } catch(e) {}
                ws = null;
            }

            isConnecting = true;
            console.log(`🔄 Conectando… (intento ${reconnectAttempts + 1})`);

            try {
                ws = new WebSocket(`ws://localhost:${wsPort}/ws`);

                ws.onopen = () => {
                    console.log('✅ Conectado a Nopolo TTS');
                    isConnecting = false;
                    reconnectAttempts = 0;
                    pingInterval = setInterval(() => {
                        if (ws && ws.readyState === WebSocket.OPEN) {
                            try { ws.send(JSON.stringify({ type: 'ping' })); }
                            catch(e) { console.error('Ping error:', e); }
                        }
                    }, 25000);
                };

                ws.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    if (data.type === 'pong') return;
                    handleMessage(data);
                };

                ws.onerror  = () => { isConnecting = false; };
                ws.onclose  = () => {
                    isConnecting = false;
                    if (pingInterval) { clearInterval(pingInterval); pingInterval = null; }
                    reconnectAttempts++;
                    const delay = Math.min(3000 * Math.pow(2, reconnectAttempts - 1), 30000);
                    console.log(`⏰ Reconectando en ${delay/1000}s…`);
                    reconnectTimeout = setTimeout(() => { reconnectTimeout = null; connect(); }, delay);
                };

            } catch(e) {
                console.error('Error creando WebSocket:', e);
                isConnecting = false;
            }
        }

        window.addEventListener('beforeunload', () => {
            if (reconnectTimeout) clearTimeout(reconnectTimeout);
            if (pingInterval)     clearInterval(pingInterval);
            if (ws) ws.close();
        });

        // ── Manejo de mensajes ──────────────────────────────────────────────
        function handleMessage(data) {
            if (data.type === 'tts_start') {
                if (hideTimeout) { clearTimeout(hideTimeout); hideTimeout = null; }
                showTTS(data.text, data.voice, data.is_nopolo || false);
            } else if (data.type === 'tts_stop') {
                hideTTS();
            }
        }

        function showTTS(text, voice, isNopolo) {
            textContent.innerHTML = '';

            // Mostrar nombre del hablante en la cabecera grande
            brandCreator.textContent = voice || '';

            textContent.innerHTML = isNopolo
                ? highlightNopoloSyntax(text)
                : escapeHtml(text);

            container.classList.remove('hidden', 'hiding');
            container.classList.add('show');
        }

        function hideTTS() {
            container.classList.remove('show');
            container.classList.add('hiding');
            hideTimeout = setTimeout(() => {
                container.classList.remove('hiding');
                container.classList.add('hidden');
                brandCreator.textContent = '';
                hideTimeout = null;
            }, 450);
        }

        function escapeHtml(text) {
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        function highlightNopoloSyntax(text) {
            let h = escapeHtml(text);
            h = h.replace(/(\w+(\.\w+)?:)/g,  '<span class="voice">$1</span>');
            h = h.replace(/(\([^)]+\))/g,      '<span class="sound">$1</span>');
            return h;
        }

        connect();
        console.log('🎙️ Nopolo TTS Overlay — PostInCloud');
        console.log(`🔌 WebSocket: ws://localhost:${wsPort}/ws`);
    </script>
</body>
</html>
